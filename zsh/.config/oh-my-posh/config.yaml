# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

palette:
    base: '#1E1E2E'
    blue: '#89B4FA'
    green: '#A6E3A1'
    lavender: '#B4BEFE'
    mauve: '#CBA6F7'
    peach: '#FAB387'
    red: '#F38BA8'
    sky: '#89DCEB'
    teal: '#94E2D5'
    text: '#CDD6F4'
    yellow: '#F9E2AF'
secondary_prompt:
    template: '❯❯ '
    foreground: p:mauve
    background: transparent
transient_prompt:
    template: '❯ '
    foreground: p:mauve
    background: transparent
upgrade:
    source: cdn
    interval: 168h
    auto: false
    notice: false
console_title_template: '{{ .Shell }} in {{ .Folder }}'
blocks:
    - type: prompt
      alignment: left
      segments:
        - options:
            folder_icon: 
            folder_separator_icon: '  '
            home_icon: "~"
            max_depth: 2
            style: agnoster_short
          leading_diamond: 
          trailing_diamond: 
          template: '  {{ .Path }} '
          foreground: p:base
          background: p:blue
          type: path
          style: diamond
        - options:
            branch_icon: ' '
            fetch_status: true
            fetch_upstream_icon: true
          template: ' {{ .UpstreamIcon }}{{ .HEAD }}{{ if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }} '
          foreground: p:base
          powerline_symbol: 
          background: p:green
          type: git
          style: powerline
          background_templates:
            - '{{ if or (.Working.Changed) (.Staging.Changed) }}p:yellow{{ end }}'
            - '{{ if and (gt .Ahead 0) (gt .Behind 0) }}p:red{{ end }}'
            - '{{ if gt .Ahead 0 }}p:peach{{ end }}'
            - '{{ if gt .Behind 0 }}p:peach{{ end }}'
        - template: '  {{ .Full }} '
          foreground: p:base
          powerline_symbol: 
          background: p:teal
          type: node
          style: powerline
        - template: '  {{ .Full }} '
          foreground: p:base
          powerline_symbol: 
          background: p:sky
          type: go
          style: powerline
        - template: '  {{ if .Venv }}{{ .Venv }} {{ end }}{{ .Full }} '
          foreground: p:base
          powerline_symbol: 
          background: p:yellow
          type: python
          style: powerline
    - type: rprompt
      overflow: hidden
      segments:
        - options:
            style: austin
            threshold: 500
          template: '  {{ .FormattedMs }} '
          foreground: p:peach
          type: executiontime
          style: plain
    - type: prompt
      alignment: left
      segments:
        - template: '{{ if eq .Env.POSH_VI_MODE "vicmd" }} N{{ else }} I{{ end }} '
          foreground: p:green
          type: text
          style: plain
          foreground_templates:
            - '{{ if eq .Env.POSH_VI_MODE "vicmd" }}p:peach{{ end }}'
        - template: ❯
          foreground: p:mauve
          type: text
          style: plain
      newline: true
version: 4
final_space: true
