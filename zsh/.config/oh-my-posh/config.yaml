# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

palette:
    base: '#1E1E2E'
    blue: '#89B4FA'
    green: '#A6E3A1'
    lavender: '#B4BEFE'
    mauve: '#CBA6F7'
    peach: '#FAB387'
    red: '#F38BA8'
    sky: '#89DCEB'
    teal: '#94E2D5'
    text: '#CDD6F4'
    yellow: '#F9E2AF'
secondary_prompt:
    template: '‚ĚĮ‚ĚĮ '
    foreground: p:mauve
    background: transparent
transient_prompt:
    template: '‚ĚĮ '
    foreground: p:mauve
    background: transparent
console_title_template: '{{ .Shell }} in {{ .Folder }}'
blocks:
    - type: prompt
      alignment: left
      segments:
        - type: path
          style: diamond
          leading_diamond: "Óā∂"
          trailing_diamond: "Óāį"
          foreground: p:base
          background: p:blue
          template: ' ÔĀľ {{ .Path }} '
          options:
            style: agnoster_short
            max_depth: 2
            home_icon: "~"
            folder_icon: "ÔĀĽ"
            folder_separator_icon: ' ÓāĪ '
        - type: git
          style: powerline
          powerline_symbol: "Óāį"
          foreground: p:base
          background: p:green
          background_templates:
            - '{{ if or (.Working.Changed) (.Staging.Changed) }}p:yellow{{ end }}'
            - '{{ if and (gt .Ahead 0) (gt .Behind 0) }}p:red{{ end }}'
            - '{{ if gt .Ahead 0 }}p:peach{{ end }}'
            - '{{ if gt .Behind 0 }}p:peach{{ end }}'
          template: ' {{ .UpstreamIcon }}{{ .HEAD }}{{ if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} ÔĀĄ {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }} ÔĀÜ {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }} ÔÜá {{ .StashCount }}{{ end }} '
          options:
            branch_icon: "Óú• "
            fetch_status: true
            fetch_upstream_icon: true
    - type: rprompt
      overflow: hidden
      segments:
        - type: java
          style: plain
          foreground: p:red
          template: ' Óúł {{ .Full }}'
          cache:
            duration: 24h
            strategy: folder
        - type: kotlin
          style: plain
          foreground: p:mauve
          template: ' Óėī'
          options:
            fetch_version: false
        - type: node
          style: plain
          foreground: p:green
          template: ' Óúė {{ .Full }}'
          cache:
            duration: 24h
            strategy: folder
        - type: python
          style: plain
          foreground: p:yellow
          template: ' ÓąĶ {{ if .Venv }}{{ .Venv }} {{ end }}{{ .Full }}'
          cache:
            duration: 24h
            strategy: folder
        - type: go
          style: plain
          foreground: p:sky
          template: ' Óėß {{ .Full }}'
          cache:
            duration: 24h
            strategy: folder
        - type: executiontime
          style: plain
          foreground: p:peach
          template: ' ÓģĘ {{ .FormattedMs }}'
          options:
            style: austin
            threshold: 500
    - type: prompt
      alignment: left
      newline: true
      segments:
        - type: vimode
          style: plain
          foreground: p:green
          foreground_templates:
            - '{{ if eq .Mode "normal" }}p:peach{{ end }}'
            - '{{ if eq .Mode "visual" }}p:mauve{{ end }}'
            - '{{ if eq .Mode "replace" }}p:red{{ end }}'
          template: 'ÓüÖ {{ if eq .Mode "normal" }}N{{ else if eq .Mode "visual" }}V{{ else if eq .Mode "replace" }}R{{ else }}I{{ end }} '
        - type: text
          style: plain
          foreground: p:mauve
          template: "‚ĚĮ"
version: 4
final_space: true
